<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISRP Mobile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=2000') center center/cover no-repeat;
height:100vh;
overflow:hidden;
color:white;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(3px);
}

.topbar{
position:absolute;
top:25px;
left:40px;
right:40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-box{
width:70px;
height:70px;
border-radius:18px;
background:linear-gradient(135deg,#7b2cff,#b600ff);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
box-shadow:0 0 25px #7b2cff;
}

.logo-text h1{
font-size:42px;
letter-spacing:3px;
}

.logo-text p{
color:#b34cff;
letter-spacing:4px;
font-size:12px;
}

.nav{
display:flex;
gap:15px;
}

.nav button{
background:transparent;
border:1px solid #6a38ff;
color:white;
padding:12px 25px;
border-radius:12px;
cursor:pointer;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.center h2{
font-size:90px;
font-weight:900;
letter-spacing:6px;
}

.center p{
letter-spacing:10px;
color:#9d68ff;
margin-bottom:40px;
}

.buttons{
display:flex;
justify-content:center;
gap:25px;
}

.play{
background:#ffd400;
color:black;
padding:22px 60px;
font-size:32px;
font-weight:bold;
border:none;
border-radius:18px;
cursor:pointer;
}

.store{
background:transparent;
border:3px solid #8f2fff;
color:#c98cff;
padding:22px 60px;
font-size:32px;
font-weight:bold;
border-radius:18px;
cursor:pointer;
}

.status{
position:absolute;
left:40px;
bottom:100px;
background:rgba(20,20,20,.7);
border:1px solid #6a38ff;
padding:20px;
border-radius:15px;
width:260px;
z-index:10;
}

.status h3{
color:#00ff66;
margin-bottom:10px;
}

.footer{
position:absolute;
bottom:20px;
left:40px;
color:#888;
z-index:10;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="topbar">

<div class="logo">
<div class="logo-box">ISRP</div>

<div class="logo-text">
<h1>ISRP MOBILE</h1>
<p>ROLEPLAY UNIVERSE</p>
</div>
</div>

<div class="nav">
<button onclick="window.open('https://discord.gg/jVyagxbjz5')">DISCORD</button>
<button>NEWS</button>
</div>

</div>

<div class="center">
<p>ENTER THE CITY</p>
<h2>ISRP</h2>

<div class="buttons">
<button class="play">▶ PLAY</button>
<button class="store">STORE</button>
</div>
</div>

<div class="status">
<h3>● ONLINE</h3>
<p>Players: 1247</p>
<p>Version: v0.1 Beta</p>
</div>

<div class="footer">
ISRP Mobile © 2026
</div>

</body>
</html>
